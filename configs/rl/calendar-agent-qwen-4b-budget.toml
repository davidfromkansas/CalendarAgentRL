name = "calendar-agent-qwen-4b-budget"
model = "Qwen/Qwen3.5-4B"
loss = "rl"
max_steps = 20

batch_size = 32
rollouts_per_example = 4
max_inflight_rollouts = 32

[sampling]
max_tokens = 2048
temperature = 0.7
enable_thinking = false

[[env]]
id = "davidfromkansas/calendar-agent"
name = "calendar-agent-easy-train"
args = { difficulty = "easy", num_examples = 128, seed = 10000, max_turns = 10 }
max_retries = 1

[eval]
interval = 10
num_examples = 8
rollouts_per_example = 1
skip_first_step = false

[eval.sampling]
max_tokens = 2048
temperature = 0.2
enable_thinking = false

[[eval.env]]
id = "davidfromkansas/calendar-agent"
name = "calendar-agent-easy-dev"
args = { difficulty = "easy", num_examples = 8, seed = 20000, max_turns = 10 }
num_examples = 8
rollouts_per_example = 1

[val]
num_examples = 16
rollouts_per_example = 1
interval = 10

[[pre_batch_filters]]
type = "zero_advantage"
enforce = false

[checkpoints]
interval = 10
keep_cloud = 2

[adapters]
interval = 10
keep_last = 2
