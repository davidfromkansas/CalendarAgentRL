# Final generalization eval template.
# This is the strongest final-exam set: new seed range plus heldout names, rooms, and time zones.
# Do not use this repeatedly while tuning.

[[eval]]
env_id = "davidfromkansas/calendar-agent"
model = "Qwen/Qwen3.5-4B"
provider = "prime"
num_examples = 100
rollouts_per_example = 1
max_tokens = 2048
temperature = 0.2
state_columns = ["task_slices", "prompt_variant", "generation_profile", "submitted_choice", "submitted_result"]
env_args = { split = "heldout_generalization", num_examples = 100, max_turns = 14, prompt_variant = "mixed" }
