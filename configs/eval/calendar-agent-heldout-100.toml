# Final heldout eval template.
# Do not use this repeatedly while tuning; treat it like a final exam.

[[eval]]
env_id = "davidfromkansas/calendar-agent"
model = "Qwen/Qwen3.5-4B"
provider = "prime"
num_examples = 100
rollouts_per_example = 1
max_tokens = 2048
temperature = 0.2
state_columns = ["task_slices", "prompt_variant", "generation_profile", "submitted_choice", "submitted_result", "score_checks_used", "score_checks_remaining"]
env_args = { split = "heldout_easy", num_examples = 100, max_turns = 10, prompt_variant = "mixed" }
