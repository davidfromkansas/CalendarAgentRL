# Fixed dev eval for calendar-agent.
# This must not overlap with RL training seeds.

[[eval]]
env_id = "davidfromkansas/calendar-agent"
model = "Qwen/Qwen3.5-4B"
provider = "prime"
num_examples = 100
rollouts_per_example = 1
max_tokens = 2048
temperature = 0.2
state_columns = ["submitted_choice", "submitted_result"]
env_args = { difficulty = "easy", num_examples = 100, seed = 20000, max_turns = 10 }
