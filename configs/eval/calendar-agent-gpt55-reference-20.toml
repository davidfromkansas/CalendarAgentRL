# Smaller reference eval for a strong model.
# Kept smaller because GPT-5.5 is much more expensive than Qwen.

[[eval]]
env_id = "davidfromkansas/calendar-agent"
model = "openai/gpt-5.5"
provider = "prime"
num_examples = 20
rollouts_per_example = 1
max_tokens = 2048
temperature = 0.2
state_columns = ["task_slices", "prompt_variant", "generation_profile", "submitted_choice", "submitted_result", "score_checks_used", "score_checks_remaining"]
env_args = { split = "dev_easy", num_examples = 20, max_turns = 10, prompt_variant = "mixed" }
